<!-- base path: রুট ("/") নাকি প্রজেক্ট-পেজ সাবপাথ — দুটোতেই কাজ করে -->
<script>
  (function () {
    var seg = location.pathname.split("/")[1] || "";
    window.__BASE__ = location.hostname.endsWith("github.io") && seg ? "/" + seg + "/" : "/";
    document.write('<link rel="stylesheet" href="' + window.__BASE__ + 'assets/style.css">');
  })();
</script>
<script>document.addEventListener("DOMContentLoaded",function(){var s=document.createElement("script");s.src=window.__BASE__+"assets/main.js";document.body.appendChild(s);});</script>
</head>
<body>

<header class="site-header">

<script>
  (function () {
    var b = window.__BASE__ || "/";
    ["home1", "home2", "home3"].forEach(function (id) { var e = document.getElementById(id); if (e) e.href = b; });
    var a = document.getElementById("about1"); if (a) a.href = b + "about.html";
  })();
</script>
