name: Deploy blog to GitHub Pages

on:
  push:
    branches: ["claude/quality-blog-guide-dpst51", "main"]
    paths:
      - "blog/**"
      - ".github/workflows/deploy-blog.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Force Pages to "GitHub Actions" source so the native branch-based
      # pages-build-deployment (which serves docs/) stops competing with this blog deploy.
      - name: Ensure Pages source is GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /tmp/pages.json -w '%{http_code}' -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}')
          echo "PUT /pages build_type=workflow -> HTTP $code"
          cat /tmp/pages.json 2>/dev/null || true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate feed & sitemap
        working-directory: blog
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: python3 generate.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
